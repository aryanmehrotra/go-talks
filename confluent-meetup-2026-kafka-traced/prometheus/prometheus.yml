global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:2121']
  - job_name: order-service
    static_configs:
      - targets: ['order-service:2122']
  - job_name: notification-service
    static_configs:
      - targets: ['notification-service:2123']
