name: Build and Deploy Order Service

on:
  push:
    branches: [ main ]

env:
  SERVICE_NAME: order
  NAMESPACE: kafka-app
  CLUSTER_NAME: workshop25th
  CLUSTER_PROJECT: devandstage
  GAR_PROJECT: devandstage
  GAR_REGISTRY: zop-dev

jobs:
  dockerize:
    runs-on: ubuntu-latest
    name: Dockerize

    outputs:
      image: ${{ steps.output-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GAR
        uses: docker/login-action@v2
        with:
          registry: us-east1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GATEWAY_KAFKA_APP_DEPLOYMENT_KEY }}

      - name: Build and Push Docker Image to GAR
        uses: docker/build-push-action@v2
        with:
          push: true
          context: ./confluent-meetup-2026-kafka-traced
          file: ./confluent-meetup-2026-kafka-traced/order-service/Dockerfile
          tags:
            us-east1-docker.pkg.dev/${{ env.GAR_PROJECT }}/${{ env.GAR_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - id: output-image
        run:
          echo "image=us-east1-docker.pkg.dev/${{ env.GAR_PROJECT }}/${{ env.GAR_REGISTRY }}/${{ env.NAMESPACE }}/${{ env.SERVICE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deployment:
    runs-on: ubuntu-latest
    needs: dockerize
    name: Deploy
    env:
      image: ${{ needs.dockerize.outputs.image }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authorize to GCP service account
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GATEWAY_KAFKA_APP_DEPLOYMENT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update Kubectl component
        run: gcloud --quiet components update kubectl

      - name: Set GCloud Project and Fetch Cluster Credentials
        run:
          gcloud container clusters get-credentials ${{ env.CLUSTER_NAME }} --region=us-east1 --project=${{ env.CLUSTER_PROJECT }}

      - name: Update Deployment Image
        run:
          kubectl set image deployment/${{ env.SERVICE_NAME }} ${{ env.SERVICE_NAME }}=${{ env.image }} --namespace ${{ env.NAMESPACE }}
